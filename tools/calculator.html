<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculator - JPTools</title>

<style>
body { margin:0; font-family:Arial; background:#0f172a; color:white; text-align:center; }
header { display:flex; align-items:center; gap:10px; padding:10px; background:#1e293b; }

.container { max-width:400px; margin:auto; padding:20px; }

#display {
    width:100%;
    height:80px;
    background:#111827;
    border-radius:10px;
    margin-bottom:10px;
    padding:10px;
    text-align:right;
    font-size:22px;
}

canvas {
    display:none;
    background:black;
    border-radius:10px;
}

.grid {
    display:grid;
    grid-template-columns: repeat(5,1fr);
    gap:10px;
}

button {
    padding:15px;
    border:none;
    border-radius:10px;
    background:#1e293b;
    color:white;
    cursor:pointer;
}

button:hover { background:#22c55e; }

.help {
    display:none;
    background:#1e293b;
    padding:15px;
    border-radius:10px;
    text-align:left;
    margin-bottom:10px;
}
</style>
</head>

<body>

<header>
<a href="../index.html">
<img src="../images/logo.png" style="height:40px;">
</a>
<h2>🧮 Calculator</h2>
<button onclick="toggleHelp()">❓</button>
</header>

<div class="container">

<div id="display">0</div>
<canvas id="game" width="300" height="200"></canvas>

<div id="helpBox" class="help">
<b>📘 Guide</b><br><br>

<b>Calculator:</b><br>
Use buttons normally → press = to calculate<br><br>

<b>Game Mode:</b><br>
Press π → enter game<br>
Press = → start game<br>
Use 8 2 4 6 → move<br>
+ / - → change game<br>
C → exit game<br><br>

<b>Games:</b><br>
🐍 Snake<br>
🚗 Dodger<br>
🎯 Tap Score<br>
</div>

<div class="grid">

<button onclick="press('7')">7</button>
<button onclick="press('8')">8</button>
<button onclick="press('9')">9</button>
<button onclick="press('/')">÷</button>
<button onclick="clearDisplay()">C</button>

<button onclick="press('4')">4</button>
<button onclick="press('5')">5</button>
<button onclick="press('6')">6</button>
<button onclick="press('*')">×</button>
<button onclick="del()">⌫</button>

<button onclick="press('1')">1</button>
<button onclick="press('2')">2</button>
<button onclick="press('3')">3</button>
<button onclick="switchGame(-1)">−</button>
<button onclick="press('%')">%</button>

<button onclick="press('0')">0</button>
<button onclick="press('.')">.</button>
<button onclick="calculate()">=</button>
<button onclick="switchGame(1)">+</button>
<button onclick="copy()">📋</button>

<button onclick="press('sqrt')">√</button>
<button onclick="press('pow')">xʸ</button>
<button onclick="press('sin')">sin</button>
<button onclick="press('cos')">cos</button>
<button onclick="press('tan')">tan</button>

<button onclick="press('log')">log</button>
<button onclick="toggleGame()">π</button>
<button onclick="press('e')">e</button>
<button onclick="press('(')">(</button>
<button onclick="press(')')">)</button>

</div>

</div>

<script>

let display = document.getElementById("display");
let canvas = document.getElementById("game");
let ctx = canvas.getContext("2d");

let gameMode = false;
let gameIndex = 0;
let games = ["snake","dodger","tap"];
let loop;

function toggleHelp(){
    let box = document.getElementById("helpBox");
    box.style.display = box.style.display==="none" ? "block" : "none";
}

// ================= CALCULATOR =================

function press(val){
    if(gameMode){
        controlGame(val);
        return;
    }

    if(display.innerText==="0") display.innerText="";

    if(val==="sqrt") display.innerText+="Math.sqrt(";
    else if(val==="pow") display.innerText+="**";
    else if(val==="sin") display.innerText+="Math.sin(";
    else if(val==="cos") display.innerText+="Math.cos(";
    else if(val==="tan") display.innerText+="Math.tan(";
    else if(val==="log") display.innerText+="Math.log10(";
    else if(val==="e") display.innerText+="Math.E";
    else display.innerText+=val;
}

function calculate(){
    if(gameMode){
        startGame();
        return;
    }

    try{
        display.innerText = eval(display.innerText);
    }catch{
        display.innerText = "Error";
    }
}

function clearDisplay(){
    if(gameMode){
        exitGame();
        return;
    }
    display.innerText="0";
}

function del(){
    if(!gameMode) display.innerText = display.innerText.slice(0,-1);
}

function copy(){
    navigator.clipboard.writeText(display.innerText);
}

// ================= GAME MODE =================

function toggleGame(){
    gameMode = !gameMode;

    if(gameMode){
        display.style.display="none";
        canvas.style.display="block";

        ctx.fillStyle="white";
        ctx.font="16px Arial";
        ctx.fillText("Press = to Start",70,100);
    } else {
        exitGame();
    }
}

function exitGame(){
    clearInterval(loop);
    gameMode=false;
    display.style.display="block";
    canvas.style.display="none";
}

// ================= CONTROL =================

let direction="RIGHT";

function controlGame(val){
    if(val==='8') direction="UP";
    if(val==='2') direction="DOWN";
    if(val==='4') direction="LEFT";
    if(val==='6') direction="RIGHT";
}

// ================= SWITCH =================

function switchGame(dir){
    if(!gameMode) return;

    gameIndex = (gameIndex + dir + games.length) % games.length;

    ctx.fillStyle="black";
    ctx.fillRect(0,0,300,200);

    ctx.fillStyle="white";
    ctx.fillText("Game: "+games[gameIndex],80,100);
}

// ================= START =================

function startGame(){
    clearInterval(loop);

    if(games[gameIndex]==="snake") startSnake();
    if(games[gameIndex]==="dodger") startDodger();
    if(games[gameIndex]==="tap") startTap();
}

// ================= SNAKE =================

let snake, food;

function startSnake(){
    snake=[{x:10,y:10}];
    food={x:5,y:5};
    direction="RIGHT";

    loop=setInterval(()=>{
        ctx.fillStyle="black";
        ctx.fillRect(0,0,300,200);

        let head={...snake[0]};

        if(direction==="UP") head.y--;
        if(direction==="DOWN") head.y++;
        if(direction==="LEFT") head.x--;
        if(direction==="RIGHT") head.x++;

        snake.unshift(head);

        if(head.x===food.x && head.y===food.y){
            food={x:Math.floor(Math.random()*20),y:Math.floor(Math.random()*13)};
        } else {
            snake.pop();
        }

        ctx.fillStyle="lime";
        snake.forEach(s=>ctx.fillRect(s.x*15,s.y*15,14,14));

        ctx.fillStyle="red";
        ctx.fillRect(food.x*15,food.y*15,14,14);

    },120);
}

// ================= DODGER =================

let playerX, obstacles;

function startDodger(){
    playerX = 140;
    obstacles = [];

    loop=setInterval(()=>{
        ctx.fillStyle="black";
        ctx.fillRect(0,0,300,200);

        if(Math.random()<0.1){
            obstacles.push({x:Math.random()*280,y:0});
        }

        obstacles.forEach(o=>{
            o.y+=5;
            ctx.fillStyle="red";
            ctx.fillRect(o.x,o.y,10,10);
        });

        if(direction==="LEFT") playerX-=5;
        if(direction==="RIGHT") playerX+=5;

        ctx.fillStyle="lime";
        ctx.fillRect(playerX,180,20,10);

    },100);
}

// ================= TAP =================

function startTap(){
    let score=0;

    loop=setInterval(()=>{
        ctx.fillStyle="black";
        ctx.fillRect(0,0,300,200);

        ctx.fillStyle="white";
        ctx.font="20px Arial";
        ctx.fillText("Score: "+score,90,100);

        score++;

    },500);
}

</script>

</body>
</html>
