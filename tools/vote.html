<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vote - JPTools</title>

<style>
body { margin:0; font-family:Arial; background:#0f172a; color:white; text-align:center; }
header { display:flex; align-items:center; gap:10px; padding:15px; background:#1e293b; }
.container { padding:20px; }
button { padding:10px; margin:5px; border:none; border-radius:10px; background:#22c55e; color:white; cursor:pointer; }
.candidate { background:#1e293b; margin:15px; padding:15px; border-radius:10px; }
.candidate img { width:100px; height:100px; border-radius:10px; }
.admin { background:#ef4444; }
.bar { height:10px; background:#22c55e; margin-top:5px; }
</style>
</head>

<body>

<header>
<img src="../images/logo.jpg" style="height:40px;">
<h2>🗳️ Vote</h2>
</header>

<div class="container">

<button onclick="login()">🔐 Login</button>
<p id="user"></p>

<h3 id="title"></h3>
<p id="timer"></p>

<div id="adminPanel" style="display:none;">
<button class="admin" onclick="endPoll()">❌ End Poll</button>
</div>

<div id="candidates"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, doc, getDoc, updateDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  projectId: "YOUR_PROJECT"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let user = null;
let pollId = new URLSearchParams(window.location.search).get("poll");
let pollData = null;

window.login = async () => {
    const result = await signInWithPopup(auth, new GoogleAuthProvider());
    user = result.user;
    document.getElementById("user").innerText = user.displayName;
    loadPoll();
};

async function loadPoll(){

const snap = await getDoc(doc(db,"polls",pollId));
pollData = snap.data();

document.getElementById("title").innerText = pollData.title;

// ADMIN PANEL
if(user && user.uid === pollData.createdBy){
    document.getElementById("adminPanel").style.display = "block";
}

// TIMER
updateTimer();

render();
}

// TIMER LOGIC
function updateTimer(){

setInterval(()=>{
    const now = Date.now();

    if(pollData.isEnded || now > pollData.endTime){
        document.getElementById("timer").innerText = "⛔ Poll Ended";
        pollData.isEnded = true;
    } else {
        const left = pollData.endTime - now;
        const mins = Math.floor(left/60000);
        const secs = Math.floor((left%60000)/1000);
        document.getElementById("timer").innerText = `⏳ ${mins}m ${secs}s left`;
    }
},1000);
}

// RENDER
function render(){

let total = pollData.candidates.reduce((sum,c)=>sum+c.votes,0);

const container = document.getElementById("candidates");
container.innerHTML = "";

pollData.candidates.forEach((c,i)=>{

let percent = total ? (c.votes/total)*100 : 0;

container.innerHTML += `
<div class="candidate">
<img src="${c.imageUrl}">
<h3>${c.name}</h3>
<p>${c.votes} votes (${percent.toFixed(1)}%)</p>
<div class="bar" style="width:${percent}%"></div>
${!pollData.isEnded ? `<button onclick="vote(${i})">Vote</button>` : ""}
</div>
`;

});
}

// VOTE
window.vote = async (i)=>{

if(!user) return alert("Login first");

if(pollData.isEnded) return alert("Poll ended");

// check duplicate
const voteRef = doc(db,"votes",pollId+"_"+user.uid);
if((await getDoc(voteRef)).exists()){
    return alert("Already voted");
}

pollData.candidates[i].votes++;

await updateDoc(doc(db,"polls",pollId),{
    candidates: pollData.candidates
});

await setDoc(voteRef,{
    uid:user.uid,
    candidate:i
});

alert("Vote submitted");
loadPoll();
};

// END POLL
window.endPoll = async ()=>{

if(user.uid !== pollData.createdBy) return;

await updateDoc(doc(db,"polls",pollId),{
    isEnded:true
});

alert("Poll ended");
loadPoll();
};

</script>

</body>
</html>
