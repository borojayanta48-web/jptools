<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kids AI Teacher - JPTools</title>

<style>
body {margin:0;font-family:Arial;background:#0f172a;color:white;text-align:center;}
header {display:flex;align-items:center;gap:10px;padding:10px;background:#1e293b;}

.container {padding:15px;}

.section {
    margin-top:20px;
    background:#1e293b;
    padding:15px;
    border-radius:10px;
}

input {
    padding:10px;
    border-radius:5px;
    border:none;
    width:80%;
}

button {
    padding:10px;
    margin:5px;
    border:none;
    border-radius:5px;
    background:#22c55e;
    color:white;
    cursor:pointer;
}

#chat {
    max-height:300px;
    overflow:auto;
    text-align:left;
    margin-top:10px;
}

.msg {
    margin:5px;
    padding:10px;
    border-radius:10px;
}

.user {background:#334155;}
.ai {background:#22c55e;color:black;}
</style>
</head>

<body>

<header>
<a href="../index.html">
<img src="../images/logo.jpg" style="height:40px;">
</a>
<h2>🤖 Kids AI Teacher</h2>
</header>

<div class="container">

<div class="section">
<h3>Ask Anything (AI Teacher)</h3>

<input id="input" placeholder="Ask like: What is 2+2 or A for ?">
<br>

<button onclick="send()">Ask</button>
<button onclick="voice()">🎤 Speak</button>

<div id="chat"></div>

</div>

</div>

<script>

// 🔑 PASTE YOUR NEW API KEY HERE
const API_KEY = "AIzaSyCMWGWw2kw7OGHY3iSlXcWjTxHebjSsC6U";

// 🔊 SPEAK
function speak(text){
speechSynthesis.cancel();
speechSynthesis.speak(new SpeechSynthesisUtterance(text));
}

// 💬 ADD MESSAGE
function addMsg(text,cls){
const div=document.createElement("div");
div.className="msg "+cls;
div.innerText=text;
document.getElementById("chat").appendChild(div);
}

// 🤖 AI CALL (IMPROVED PROMPT)
async function send(){

const input=document.getElementById("input");
const text=input.value.trim();

if(!text) return;

addMsg(text,"user");
input.value="";

try{

const res = await fetch(
"https://generativelanguage.googleapis.com/v1/models/gemini-pro:generateContent?key="+API_KEY,
{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
contents:[{
parts:[{
text: "You are a friendly teacher for kids. Explain simply and clearly: " + text
}]
}]
})
});

const data = await res.json();

let reply = data.candidates?.[0]?.content?.parts?.[0]?.text 
|| "Hmm I couldn't understand, try again 😊";

addMsg(reply,"ai");
speak(reply);

}catch(e){
addMsg("⚠️ AI Error. Check API key or internet.","ai");
}

}

// 🎤 VOICE INPUT
function voice(){
try{
const rec=new (window.SpeechRecognition||window.webkitSpeechRecognition)();

rec.onresult=e=>{
document.getElementById("input").value=e.results[0][0].transcript;
send();
};

rec.start();

}catch{
alert("Voice not supported on this device");
}
}

</script>

</body>
</html>
