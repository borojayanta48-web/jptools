<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kids AI Pro</title>

<style>
body {
    margin:0;
    font-family: Arial;
    background:#0f172a;
    color:white;
    text-align:center;
}

header {
    display:flex;
    align-items:center;
    gap:10px;
    padding:15px;
    background:#1e293b;
}

.container {
    padding:20px;
}

input, select {
    width:80%;
    padding:12px;
    margin:10px;
    border-radius:10px;
    border:none;
}

button {
    padding:12px 18px;
    margin:5px;
    border:none;
    border-radius:10px;
    background:#22c55e;
    color:white;
    cursor:pointer;
}

button:hover {
    background:#16a34a;
}

.logout {
    background:#ef4444;
}

.chat {
    max-height:300px;
    overflow-y:auto;
    margin-top:20px;
}

.msg {
    background:#334155;
    padding:10px;
    margin:8px;
    border-radius:10px;
    text-align:left;
}
</style>
</head>

<body>

<header>
<img src="../images/logo.png" style="height:40px;">
<h2>🤖 Kids AI Pro</h2>
</header>

<div class="container">

<div id="authBox">
<button onclick="login()">🔐 Login with Google</button>
</div>

<div id="userBox" style="display:none;">
<button class="logout" onclick="logout()">🚪 Logout</button>
<h3 id="userName"></h3>
</div>

<select id="mode">
<option value="General">General</option>
<option value="Math">Math</option>
<option value="English">English</option>
<option value="GK">GK</option>
</select>

<input type="text" id="input" placeholder="Ask anything...">

<br>
<button onclick="ask()">Ask</button>
<button onclick="speak()">🎤 Speak</button>
<button onclick="exportChat()">📦 Export</button>

<div class="chat" id="chat"></div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "YOUR_FIREBASE_API_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  projectId: "YOUR_PROJECT"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();

let currentUser = null;

// LOGIN
window.login = async () => {
    const result = await signInWithPopup(auth, provider);
    currentUser = result.user;
};

// LOGOUT
window.logout = async () => {
    await signOut(auth);
};

// AUTH STATE
onAuthStateChanged(auth, user => {
    if(user){
        currentUser = user;
        document.getElementById("authBox").style.display="none";
        document.getElementById("userBox").style.display="block";
        document.getElementById("userName").innerText = "Logged in: " + user.displayName;
    } else {
        document.getElementById("authBox").style.display="block";
        document.getElementById("userBox").style.display="none";
    }
});

// 🔥 AI FUNCTION (FIXED)
async function askAI(prompt){

try{

const API_KEY = "AIzaSyBFxMdKWZG3RQI5skhmbx7WHNuJ2oaY1GE";

const res = await fetch(
`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash-latest:generateContent?key=${API_KEY}`,
{
method: "POST",
headers: {
"Content-Type": "application/json"
},
body: JSON.stringify({
contents: [
{
role: "user",
parts: [{ text: prompt }]
}
]
})
}
);

const data = await res.json();

console.log(data);

if(data?.candidates?.[0]?.content?.parts?.[0]?.text){
return data.candidates[0].content.parts[0].text;
}

if(data?.error){
return "❌ " + data.error.message;
}

return "⚠️ No response";

}catch(err){
return "❌ Connection error";
}
}

// ASK BUTTON
window.ask = async () => {

const input = document.getElementById("input").value;
if(!input) return;

addMessage(input);

const mode = document.getElementById("mode").value;

let finalPrompt = "";

if(mode==="Math"){
finalPrompt = "Solve simply for kids: " + input;
}else if(mode==="English"){
finalPrompt = "Explain in simple English for kids: " + input;
}else if(mode==="GK"){
finalPrompt = "Give general knowledge answer for kids: " + input;
}else{
finalPrompt = input;
}

const res = await askAI(finalPrompt);
addMessage(res);

document.getElementById("input").value="";
};

// CHAT UI
function addMessage(text){
const div = document.createElement("div");
div.className="msg";
div.innerText = text;
document.getElementById("chat").appendChild(div);
}

// VOICE
window.speak = () => {
const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
if(!SR){ alert("Not supported"); return; }
const rec = new SR();
rec.onresult = e=>{
document.getElementById("input").value = e.results[0][0].transcript;
};
rec.start();
};

// EXPORT
window.exportChat = () => {
const text = document.getElementById("chat").innerText;
const blob = new Blob([text], {type:"text/plain"});
const a = document.createElement("a");
a.href = URL.createObjectURL(blob);
a.download = "chat.txt";
a.click();
};
</script>

</body>
</html>
