<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kids Zone Ultra - JPTools</title>

<style>
body {margin:0;font-family:Arial;background:#0f172a;color:white;text-align:center;}
header {display:flex;align-items:center;gap:10px;padding:10px;background:#1e293b;}
.container {padding:15px;}
.grid {display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}
.box {padding:15px;background:#22c55e;border-radius:10px;font-size:18px;cursor:pointer;}
.section {margin-top:20px;background:#1e293b;padding:15px;border-radius:10px;}
button {padding:10px;margin:5px;border:none;border-radius:5px;background:#22c55e;color:white;}
canvas {background:white;border-radius:10px;touch-action:none;}
</style>
</head>

<body>

<header>
<a href="../index.html">
<img src="../images/logo.jpg" style="height:40px;">
</a>
<h2>🧸 Kids Zone Ultra</h2>
</header>

<div class="container">

<!-- ABC -->
<div class="section">
<h3>🔤 Alphabets</h3>
<div class="grid" id="abc"></div>
</div>

<!-- QUIZ -->
<div class="section">
<h3>🎯 Smart Quiz</h3>
<div id="question">Click Start</div>
<input id="answer" placeholder="Answer">
<br>
<button onclick="startQuiz()">Start</button>
<button onclick="check()">Submit</button>
<div id="score"></div>
</div>

<!-- MEMORY -->
<div class="section">
<h3>🧠 Memory Game</h3>
<button onclick="startMemory()">🔄 Restart</button>
<div class="grid" id="memory"></div>
</div>

<!-- DRAW -->
<div class="section">
<h3>🖍️ Drawing Pro</h3>

<input type="color" id="color" value="#000000">
<select id="size">
<option value="2">Small</option>
<option value="5">Medium</option>
<option value="10">Large</option>
</select>

<br>

<canvas id="draw" width="300" height="200"></canvas>

<br>
<button onclick="clearCanvas()">Clear</button>
<button onclick="toggleFullscreen()">Fullscreen</button>

</div>

</div>

<script>

// 🔊 SPEECH
function speak(t){
speechSynthesis.cancel();
speechSynthesis.speak(new SpeechSynthesisUtterance(t));
}

// 🔤 FULL ABC WORDS (FIXED)
const words={
A:"Apple",B:"Ball",C:"Cat",D:"Dog",E:"Elephant",F:"Fish",G:"Goat",
H:"Hat",I:"Ice Cream",J:"Jug",K:"Kite",L:"Lion",M:"Monkey",
N:"Nest",O:"Orange",P:"Parrot",Q:"Queen",R:"Rabbit",
S:"Sun",T:"Tiger",U:"Umbrella",V:"Van",W:"Watch",
X:"Xylophone",Y:"Yak",Z:"Zebra"
};

const abc=document.getElementById("abc");
for(let i=65;i<=90;i++){
let l=String.fromCharCode(i);
let el=document.createElement("div");
el.className="box";
el.innerText=l;
el.onclick=()=>speak(l+" for "+words[l]);
abc.appendChild(el);
}

// 🎯 SMART QUIZ
let answer,score=0;

function startQuiz(){
const q=[
{q:"A for ?",a:"apple"},
{q:"B for ?",a:"ball"},
{q:"2 + 3",a:"5"},
{q:"5 - 2",a:"3"},
{q:"C for ?",a:"cat"}
];
let r=q[Math.floor(Math.random()*q.length)];
answer=r.a;
document.getElementById("question").innerText=r.q;
}

function check(){
let user=document.getElementById("answer").value.toLowerCase();
if(user===answer){
score++;
speak("Correct");
}else{
speak("Wrong");
}
document.getElementById("score").innerText="Score: "+score;
}

// 🧠 MEMORY GAME FIX
function startMemory(){
const mem=document.getElementById("memory");
mem.innerHTML="";

let arr=["A","A","B","B","C","C","D","D","E","E","F","F"];
arr.sort(()=>Math.random()-0.5);

let first=null;

arr.forEach(v=>{
let el=document.createElement("div");
el.className="box";
el.innerText="?";

el.onclick=()=>{
el.innerText=v;
if(!first){
first=el;
}else{
if(first.innerText===el.innerText){
speak("Match");
}else{
setTimeout(()=>{
el.innerText="?";
first.innerText="?";
},500);
}
first=null;
}
};

mem.appendChild(el);
});
}

startMemory();

// 🎨 DRAW PRO
const canvas=document.getElementById("draw");
const ctx=canvas.getContext("2d");

let drawing=false;

canvas.addEventListener("mousedown",()=>drawing=true);
canvas.addEventListener("mouseup",()=>drawing=false);

canvas.addEventListener("mousemove",(e)=>{
if(!drawing) return;

ctx.fillStyle=document.getElementById("color").value;
let size=document.getElementById("size").value;

ctx.fillRect(e.offsetX,e.offsetY,size,size);
});

canvas.addEventListener("touchmove",(e)=>{
let rect=canvas.getBoundingClientRect();
let x=e.touches[0].clientX-rect.left;
let y=e.touches[0].clientY-rect.top;

ctx.fillStyle=document.getElementById("color").value;
let size=document.getElementById("size").value;

ctx.fillRect(x,y,size,size);
});

function clearCanvas(){
ctx.clearRect(0,0,canvas.width,canvas.height);
}

// FULLSCREEN
function toggleFullscreen(){
if(!document.fullscreenElement){
canvas.requestFullscreen();
}else{
document.exitFullscreen();
}
}

</script>

</body>
</html>
