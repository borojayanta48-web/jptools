<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kids Learning Zone - JPTools</title>

<style>
body {
    margin:0;
    font-family:Arial;
    background:#0f172a;
    color:white;
    text-align:center;
}

header {
    display:flex;
    align-items:center;
    gap:10px;
    padding:10px;
    background:#1e293b;
}

.container { padding:15px; }

.grid {
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:10px;
}

.box {
    padding:15px;
    background:#22c55e;
    border-radius:10px;
    font-size:18px;
    cursor:pointer;
}

.box:hover {
    transform:scale(1.1);
}

.section {
    margin-top:20px;
    background:#1e293b;
    padding:15px;
    border-radius:10px;
}

button {
    padding:10px;
    margin:5px;
    border:none;
    border-radius:5px;
    background:#22c55e;
    color:white;
    cursor:pointer;
}

.big {
    font-size:40px;
    margin:10px;
}
</style>
</head>

<body>

<header>
<a href="../index.html">
<img src="../images/logo.jpg" style="height:40px;">
</a>
<h2>🧸 Kids Learning Zone</h2>
</header>

<div class="container">

<!-- 🔤 ABC -->
<div class="section">
<h3>🔤 Alphabets</h3>
<div class="grid" id="abc"></div>
</div>

<!-- 🔢 NUMBERS -->
<div class="section">
<h3>🔢 Numbers</h3>
<div class="grid" id="numbers"></div>
</div>

<!-- 🎮 QUIZ -->
<div class="section">
<h3>🎯 Quiz Game</h3>
<div class="big" id="question">Click Start</div>
<input id="answer" placeholder="Type answer">
<br>
<button onclick="startQuiz()">Start</button>
<button onclick="checkAnswer()">Submit</button>
<div id="score"></div>
</div>

</div>

<script>

// 🔊 SPEECH
function speak(text){
    const msg = new SpeechSynthesisUtterance(text);
    speechSynthesis.speak(msg);
}

// 🔤 ABC
const abcDiv = document.getElementById("abc");
for(let i=65;i<=90;i++){
    let letter = String.fromCharCode(i);
    let el = document.createElement("div");
    el.className="box";
    el.innerText=letter;
    el.onclick=()=> speak(letter + " for " + getWord(letter));
    abcDiv.appendChild(el);
}

function getWord(l){
    const words={
        A:"Apple",B:"Ball",C:"Cat",D:"Dog",E:"Elephant",
        F:"Fish",G:"Goat",H:"Hat",I:"Ice cream",J:"Jug",
        K:"Kite",L:"Lion",M:"Monkey",N:"Nest",O:"Orange",
        P:"Parrot",Q:"Queen",R:"Rabbit",S:"Sun",T:"Tiger",
        U:"Umbrella",V:"Van",W:"Watch",X:"Xylophone",
        Y:"Yak",Z:"Zebra"
    };
    return words[l];
}

// 🔢 NUMBERS
const numDiv = document.getElementById("numbers");
for(let i=1;i<=20;i++){
    let el=document.createElement("div");
    el.className="box";
    el.innerText=i;
    el.onclick=()=> speak(i.toString());
    numDiv.appendChild(el);
}

// 🎮 QUIZ
let currentAnswer=0;
let score=0;

function startQuiz(){
    currentAnswer = Math.floor(Math.random()*10)+1;
    document.getElementById("question").innerText="What is "+currentAnswer+" ?";
}

function checkAnswer(){
    const user = document.getElementById("answer").value;
    if(parseInt(user) === currentAnswer){
        score++;
        speak("Correct");
    } else {
        speak("Wrong");
    }
    document.getElementById("score").innerText="Score: "+score;
}

</script>

</body>
</html>
