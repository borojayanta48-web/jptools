<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kids AI Pro - JayVox</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
}

header{
display:flex;
align-items:center;
gap:10px;
padding:10px;
background:#1e293b;
}

.container{
padding:20px;
}

input,select{
padding:12px;
margin:5px;
border-radius:10px;

width:90%;

}

button{

}

.logout{
background:#ef4444;
}

.chat{
margin-top:20px;
background:#1e293b;

border-radius:10px;
text-align:left;
}

.user{
background:#334155;
padding:10px;
margin:5px 0;
border-radius:10px;
}

.ai{
background:#22c55e;
padding:10px;
margin:5px 0;
border-radius:10px;
color:black;
}
</style>
</head>

<body>

<header>
<a href="../index.html">
<img src="../images/logo.jpg" style="height:40px;">
</a>
<h2>🤖 Kids AI Pro</h2>
</header>

<div class="container">

<button id="loginBtn">🔐 Login with Google</button>
<button id="logoutBtn" class="logout" style="display:none;">🚪 Logout</button>

<p id="userName"></p>

<select id="mode">
<option value="general">General</option>
<option value="math">Math</option>
<option value="english">English</option>
<option value="gk">GK</option>
</select>

<input id="question" placeholder="Ask anything...">

<br>

<button onclick="ask()">Ask</button>
<button onclick="speak()">🎤 Speak</button>
<button onclick="exportChat()">📦 Export</button>

<div class="chat" id="chat"></div>

</div>

<script type="module">

// 🔥 FIREBASE
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
getAuth,
GoogleAuthProvider,
signInWithPopup,
signOut,
onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
getDatabase,
ref,
push,
onValue
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
apiKey:"AIzaSyACzipenb7Sx0-XsNF8xiNCEE8uIeOsXuU",
authDomain:"jayvox-be536.firebaseapp.com",
databaseURL:"https://jayvox-be536-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId:"jayvox-be536",
storageBucket:"jayvox-be536.firebasestorage.app",
messagingSenderId:"427814511964",
appId:"1:427814511964:web:e8a16e2e2275ef1d160d99"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

let userId = null;

// 🔐 LOGIN
document.getElementById("loginBtn").onclick = async () => {
const provider = new GoogleAuthProvider();
await signInWithPopup(auth, provider);
};

// 🚪 LOGOUT
document.getElementById("logoutBtn").onclick = () => {
signOut(auth);
};

// 👤 AUTH STATE
onAuthStateChanged(auth, user => {

if(user){
userId = user.uid;

document.getElementById("userName").innerText = "Logged in: " + user.displayName;

document.getElementById("loginBtn").style.display = "none";
document.getElementById("logoutBtn").style.display = "inline-block";

loadChat();

}else{
userId = null;

document.getElementById("userName").innerText = "";

document.getElementById("loginBtn").style.display = "inline-block";
document.getElementById("logoutBtn").style.display = "none";

document.getElementById("chat").innerHTML = "";
}
});

// 🔥 GEMINI API FIXED
async function askAI(prompt){

try{

const res = await fetch(
"https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=AIzaSyAHyoy0k5SMe6u5XafRcxlv8zFH0lCHLCY",
{
method: "POST",
headers: {
"Content-Type": "application/json"
},
body: JSON.stringify({
contents: [
{
role: "user",
parts: [{ text: prompt }]
}
]
})
}
);

const data = await res.json();

console.log("FULL RESPONSE:", data);

if(data.candidates && data.candidates.length > 0){
return data.candidates[0].content.parts[0].text;
}

if(data.error){
return "❌ " + data.error.message;
}

return "⚠️ No response";

}catch(err){
console.log(err);
return "❌ Connection error";
}
}

// 💬 ASK
window.ask = async function(){

if(!userId){
alert("Please login first");
return;
}

const q = document.getElementById("question").value;

addMessage("user", q);

const a = await askAI(q);

addMessage("ai", a);

// save
push(ref(db,"chats/"+userId),{
q,a,time:Date.now()
});
};

// 🧠 LOAD CHAT
function loadChat(){

const chatRef = ref(db,"chats/"+userId);

onValue(chatRef,snap=>{
const data = snap.val();
const chatDiv = document.getElementById("chat");
chatDiv.innerHTML="";

for(const key in data){
const item = data[key];
addMessage("user", item.q);
addMessage("ai", item.a);
}
});
}

// UI
function addMessage(type,text){

const div = document.createElement("div");
div.className = type==="user" ? "user" : "ai";
div.innerText = text;

document.getElementById("chat").appendChild(div);
}

// 🎤 SPEAK
window.speak = function(){
const text = document.getElementById("question").value;
const utter = new SpeechSynthesisUtterance(text);
speechSynthesis.speak(utter);
};

// 📦 EXPORT
window.exportChat = function(){

const text = document.getElementById("chat").innerText;

const blob = new Blob([text], {type:"text/plain"});
const a = document.createElement("a");

a.href = URL.createObjectURL(blob);
a.download = "chat.txt";
a.click();
};

</script>

</body>
</html>
