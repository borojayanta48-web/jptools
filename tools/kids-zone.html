<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kids AI Zone - JPTools</title>

<style>
body {margin:0;font-family:Arial;background:#0f172a;color:white;text-align:center;}
header {display:flex;align-items:center;gap:10px;padding:10px;background:#1e293b;}
.container {padding:15px;}
.grid {display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}
.box {padding:15px;background:#22c55e;border-radius:10px;font-size:18px;cursor:pointer;}
.section {margin-top:20px;background:#1e293b;padding:15px;border-radius:10px;}
button {padding:10px;margin:5px;border:none;border-radius:5px;background:#22c55e;color:white;}
canvas {background:white;border-radius:10px;}
</style>
</head>

<body>

<header>
<a href="../index.html">
<img src="../images/logo.jpg" style="height:40px;">
</a>
<h2>🤖 Kids AI Zone</h2>
</header>

<div class="container">

<!-- 🔤 ABC -->
<div class="section">
<h3>🔤 Tap & Learn</h3>
<div class="grid" id="abc"></div>
</div>

<!-- 🤖 AI TEACHER -->
<div class="section">
<h3>🤖 Ask AI Teacher</h3>
<input id="aiInput" placeholder="Ask anything...">
<br>
<button onclick="askAI()">Ask</button>
<button onclick="voiceAsk()">🎤 Speak</button>
<div id="aiOutput"></div>
</div>

<!-- 🎯 SMART QUIZ -->
<div class="section">
<h3>🎯 Smart Quiz</h3>
<div id="question">Start Quiz</div>
<input id="answer">
<br>
<button onclick="startQuiz()">Start</button>
<button onclick="check()">Submit</button>
<div id="score"></div>
</div>

<!-- 🎨 DRAW AI -->
<div class="section">
<h3>🎨 Draw & AI Guess</h3>
<canvas id="draw" width="300" height="200"></canvas>
<br>
<button onclick="guessDrawing()">🤖 Guess</button>
<button onclick="clearCanvas()">Clear</button>
<div id="guess"></div>
</div>

</div>

<script>

// 🔊 SPEAK
function speak(t){
speechSynthesis.cancel();
speechSynthesis.speak(new SpeechSynthesisUtterance(t));
}

// 🔤 ABC
const words={A:"Apple",B:"Ball",C:"Cat",D:"Dog"};
const abc=document.getElementById("abc");

for(let i=65;i<=90;i++){
let l=String.fromCharCode(i);
let el=document.createElement("div");
el.className="box";
el.innerText=l;
el.onclick=()=>speak(l+" for "+(words[l]||l));
abc.appendChild(el);
}

// 🤖 AI LOGIC
function askAI(){
let q=document.getElementById("aiInput").value.toLowerCase();
let res="I don't know yet 😅";

if(q.includes("2+2")) res="2 plus 2 is 4";
if(q.includes("a")) res="A for Apple";
if(q.includes("b")) res="B for Ball";

document.getElementById("aiOutput").innerText=res;
speak(res);
}

// 🎤 VOICE AI
function voiceAsk(){
try{
let rec=new (window.SpeechRecognition || window.webkitSpeechRecognition)();
rec.onresult=e=>{
let text=e.results[0][0].transcript;
document.getElementById("aiInput").value=text;
askAI();
};
rec.start();
}catch{
alert("Voice not supported");
}
}

// 🎯 QUIZ (ADAPTIVE)
let score=0,level=1,ans;

function startQuiz(){
ans=Math.floor(Math.random()*level)+1;
document.getElementById("question").innerText="What is "+ans+" + 1 ?";
}

function check(){
let user=document.getElementById("answer").value;
if(parseInt(user)==ans+1){
score++;
level++;
speak("Great job!");
}else{
speak("Try again");
}
document.getElementById("score").innerText="Score:"+score+" Level:"+level;
}

// 🎨 DRAW
const canvas=document.getElementById("draw");
const ctx=canvas.getContext("2d");

let draw=false;

canvas.onmousedown=()=>draw=true;
canvas.onmouseup=()=>draw=false;

canvas.onmousemove=e=>{
if(draw) ctx.fillRect(e.offsetX,e.offsetY,4,4);
};

function clearCanvas(){
ctx.clearRect(0,0,300,200);
}

// 🤖 GUESS DRAWING
function guessDrawing(){
let res=["Circle","Line","Random Shape"];
let guess=res[Math.floor(Math.random()*res.length)];
document.getElementById("guess").innerText="AI thinks: "+guess;
speak(guess);
}

</script>

</body>
</html>
