<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Age Calculator - JPTools</title>

<style>
body {
    margin:0;
    font-family: Arial;
    background:#0f172a;
    color:white;
    text-align:center;
}

header {
    display:flex;
    align-items:center;
    gap:10px;
    padding:10px;
    background:#1e293b;
}

.container {
    padding:20px;
}

input, select {
    padding:10px;
    margin:5px;
    border-radius:5px;
    border:none;
    width:200px;
}

button {
    padding:10px 15px;
    margin:5px;
    border:none;
    border-radius:5px;
    background:#22c55e;
    color:white;
    cursor:pointer;
}

.result {
    margin-top:20px;
    background:#1e293b;
    padding:15px;
    border-radius:10px;
}
</style>
</head>

<body>

<header>
<a href="../index.html">
    <img src="../images/logo.png" style="height:40px;">
</a>
<h2>🎂 Age Calculator</h2>
</header>

<div class="container">

<input id="dob" placeholder="DD-MM-YYYY">
<br>
<input id="time" placeholder="HH:MM (optional)">
<br>

<select id="era">
<option value="CE">Common Era (CE)</option>
<option value="BCE">Before Common Era (BCE)</option>
</select>

<br>
<button onclick="calculateAge()">Calculate Age</button>

<div class="result" id="result"></div>

</div>

<script>
let interval;

function calculateAge() {
    clearInterval(interval);

    const dobInput = document.getElementById("dob").value;
    const timeInput = document.getElementById("time").value || "00:00";

    if (!dobInput.includes("-")) {
        alert("Use format DD-MM-YYYY");
        return;
    }

    let [day, month, year] = dobInput.split("-").map(Number);
    let [hour, minute] = timeInput.split(":").map(Number);

    const era = document.getElementById("era").value;

    if (era === "BCE") {
        year = -year;
    }

    const dob = new Date(year, month-1, day, hour, minute);

    interval = setInterval(() => {
        const now = new Date();
        const diff = now - dob;

        const seconds = Math.floor(diff/1000);
        const minutes = Math.floor(seconds/60);
        const hours = Math.floor(minutes/60);
        const days = Math.floor(hours/24);
        const years = Math.floor(days/365);
        const months = Math.floor(days/30);

        const milliseconds = diff;
        const nanoseconds = diff * 1000000;

        const nextBirthday = new Date(now.getFullYear(), month-1, day);
        if (nextBirthday < now) nextBirthday.setFullYear(now.getFullYear()+1);

        const birthdayDiff = nextBirthday - now;
        const birthdayDays = Math.floor(birthdayDiff / (1000*60*60*24));

        const zodiac = getZodiac(day, month);

        document.getElementById("result").innerHTML = `
            <h3>🧠 Your Age</h3>
            <p>${years} Years</p>
            <p>${months} Months</p>
            <p>${days} Days</p>
            <p>${hours} Hours</p>
            <p>${minutes} Minutes</p>
            <p>${seconds} Seconds</p>
            <p>${milliseconds} Milliseconds</p>
            <p>${nanoseconds} Nanoseconds</p>

            <hr>

            <p>🎂 Next Birthday in: ${birthdayDays} days</p>
            <p>🪐 Zodiac: ${zodiac}</p>
        `;
    }, 1000);
}

function getZodiac(day, month) {
    const signs = [
        ["Capricorn", 19], ["Aquarius", 18], ["Pisces", 20],
        ["Aries", 19], ["Taurus", 20], ["Gemini", 20],
        ["Cancer", 22], ["Leo", 22], ["Virgo", 22],
        ["Libra", 22], ["Scorpio", 21], ["Sagittarius", 21], ["Capricorn", 31]
    ];
    return (day > signs[month-1][1]) ? signs[month][0] : signs[month-1][0];
}
</script>

</body>
</html>
