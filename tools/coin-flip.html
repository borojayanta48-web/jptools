<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coin Flip - JPTools</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0f172a;
    color:white;
    text-align:center;
}

header{
    display:flex;
    align-items:center;
    gap:10px;
    padding:10px;
    background:#1e293b;
}

.container{
    padding:20px;
}

/* 🪙 3D COIN */
.coin-container{
    perspective:1000px;
}

.coin{
    width:150px;
    height:150px;
    margin:20px auto;
    position:relative;
    transform-style:preserve-3d;
    transition:transform 1s ease-out;
}

.face{
    position:absolute;
    width:100%;
    height:100%;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:28px;
    backface-visibility:hidden;
    background:gold;
}

.heads{ transform:rotateY(0deg); }
.tails{ transform:rotateY(180deg); }

button{
    padding:10px;
    margin:5px;
    border:none;
    border-radius:8px;
    background:#22c55e;
    color:white;
    cursor:pointer;
}

button:hover{
    background:#16a34a;
}

.card{
    background:#1e293b;
    padding:15px;
    margin-top:10px;
    border-radius:10px;
}
</style>
</head>

<body>

<header>
<a href="../index.html">
<img src="../images/logo.png" style="height:40px;">
</a>
<h2>🪙 Coin Flip</h2>
</header>

<div class="container">

<div class="coin-container">
    <div id="coin" class="coin">
        <div class="face heads">H</div>
        <div class="face tails">T</div>
    </div>
</div>

<div>
<button onclick="setGuess('Heads')">Heads</button>
<button onclick="setGuess('Tails')">Tails</button>
</div>

<button onclick="flip()">🎯 Flip</button>

<div class="card" id="result"></div>

<div class="card">
<h3>📊 Stats</h3>
<div id="stats"></div>
</div>

<div class="card">
<h3>📜 History (last 10)</h3>
<div id="history"></div>
</div>

<div class="card">
<h3>💰 Coins</h3>
<div id="coins"></div>
</div>

<div class="card">
<h3>⚡ Multi Flip</h3>
<button onclick="multiFlip(10)">10</button>
<button onclick="multiFlip(50)">50</button>
<button onclick="multiFlip(100)">100</button>
</div>

<div class="card">
<button onclick="resetStats()">🔁 Reset</button>
<button onclick="toggleSound()">🔊 Sound</button>
</div>

</div>

<script>

let heads=0, tails=0, total=0;
let guess=null;
let streak=0;
let sound=true;
let coinBalance=100;
let history=[];

function setGuess(g){
    guess=g;
}

function flip(){

    const coin = document.getElementById("coin");

    // 🎯 RANDOM ROTATION (REALISTIC)
    const spins = Math.floor(Math.random()*4)+4;
    const result = Math.random()<0.5 ? "Heads" : "Tails";

    let rotation = spins * 360;

    if(result === "Tails"){
        rotation += 180;
    }

    coin.style.transform = `rotateX(${rotation}deg) rotateY(${rotation/2}deg)`;

    setTimeout(()=>{

        total++;
        if(result==="Heads") heads++;
        else tails++;

        history.unshift(result);
        if(history.length>10) history.pop();

        let msg = `Result: ${result}`;

        if(guess){
            if(guess===result){
                streak++;
                coinBalance += 10;
                msg += " ✅ You Win!";
            } else {
                streak=0;
                coinBalance -= 10;
                msg += " ❌ You Lose!";
            }
        }

        document.getElementById("result").innerHTML = msg;

        updateStats();
        updateHistory();
        updateCoins();

        guess=null;

        if(sound){
            new Audio("https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg").play();
        }

    },1000);
}

function updateStats(){
    const hp = total ? ((heads/total)*100).toFixed(1) : 0;
    const tp = total ? ((tails/total)*100).toFixed(1) : 0;

    document.getElementById("stats").innerHTML = `
    Total: ${total}<br>
    Heads: ${heads} (${hp}%)<br>
    Tails: ${tails} (${tp}%)<br>
    🔥 Streak: ${streak}
    `;
}

function updateHistory(){
    document.getElementById("history").innerText = history.join(" | ");
}

function updateCoins(){
    document.getElementById("coins").innerText = `💰 ${coinBalance}`;
}

function multiFlip(n){
    for(let i=0;i<n;i++){
        const res = Math.random()<0.5 ? "Heads" : "Tails";
        total++;
        if(res==="Heads") heads++;
        else tails++;

        history.unshift(res);
        if(history.length>10) history.pop();
    }
    updateStats();
    updateHistory();
    document.getElementById("result").innerText = `Flipped ${n} coins`;
}

function resetStats(){
    heads=0;
    tails=0;
    total=0;
    streak=0;
    coinBalance=100;
    history=[];
    guess=null;

    document.getElementById("result").innerText = "";
    document.getElementById("coin").style.transform = "rotateX(0deg)";

    updateStats();
    updateHistory();
    updateCoins();
}

function toggleSound(){
    sound=!sound;
    alert(sound ? "Sound ON" : "Sound OFF");
}

updateStats();
updateCoins();

</script>

</body>
</html>
