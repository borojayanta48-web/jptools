<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>JayVox TV v1.6</title>
<style>
body{margin:0;background:#0b1220;color:#fff;font-family:Arial,sans-serif}
header{background:#111827;padding:12px;display:flex;gap:10px;justify-content:center;flex-wrap:wrap;position:sticky;top:0}
.btn{background:#2563eb;color:#fff;text-decoration:none;border:none;padding:10px 14px;border-radius:8px;cursor:pointer}
.container{max-width:1400px;margin:auto;padding:15px}
.search{width:100%;padding:12px;border:none;border-radius:10px;margin-bottom:12px}
.player{aspect-ratio:16/9;background:#000;border-radius:14px;overflow:hidden}
iframe{width:100%;height:100%;border:0}
.section{margin-top:20px}
.tabs{display:flex;flex-wrap:wrap;gap:8px}
.tab{background:#1f2937;padding:8px 12px;border-radius:20px;cursor:pointer}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px}
.card{background:#1f2937;border-radius:12px;overflow:hidden;cursor:pointer}
.thumb{height:120px;display:flex;align-items:center;justify-content:center;font-size:40px;background:#374151}
.meta{padding:10px}
.small{font-size:12px;opacity:.75}
#favoritesPanel{display:none;position:fixed;inset:0;background:rgba(0,0,0,.92);padding:20px;overflow:auto}
.favItem{background:#1f2937;padding:10px;border-radius:8px;margin:8px 0;cursor:pointer}
</style>
</head>
<body>
<header>
<a class="btn" href="https://jayvox.in">🏠 Home</a>
<button class="btn" onclick="randomVideo()">🎲 Surprise Me</button>
<button class="btn" onclick="toggleFavorites()">⭐ Favorites</button>
</header>

<div class="container">
<input id="search" class="search" placeholder="Search videos...">

<div class="player"><iframe id="player" allowfullscreen></iframe></div>

<h2 id="title">JayVox TV</h2>
<div id="category"></div>

<div class="section">
<h3>Continue Watching</h3>
<div id="continueBox" class="small">Nothing watched yet.</div>
</div>

<div class="section">
<h3>Categories</h3>
<div id="tabs" class="tabs"></div>
</div>

<div class="section">
<h3>Recently Watched</h3>
<div id="recentBox" class="small">No history yet.</div>
</div>

<div class="section">
<h3>All Videos (<span id="count">0</span>)</h3>
<div id="cards" class="grid"></div>
</div>
</div>

<div id="favoritesPanel">
<h2>⭐ Favorite Videos</h2>
<button class="btn" onclick="toggleFavorites()">Close</button>
<div id="favoritesList"></div>
</div>

<script>
const videos=[
{e:"🚀",t:"NASA Live Earth",c:"Space",u:"https://www.youtube.com/embed/DDU-rZs-Ic4"},
{e:"🌕",t:"Artemis Mission",c:"Space",u:"https://www.youtube.com/embed/21X5lGlDOfg"},
{e:"🏛️",t:"Ancient Civilizations",c:"History",u:"https://www.youtube.com/embed/hle2-bGDh10"},
{e:"⚔️",t:"World War Documentary",c:"History",u:"https://www.youtube.com/embed/HAnw168huqA"},
{e:"🧪",t:"Science Documentary",c:"Science",u:"https://www.youtube.com/embed/Q1YqgPAtzho"},
{e:"🌿",t:"Wildlife Nature",c:"Nature",u:"https://www.youtube.com/embed/6v2L2UGZJAM"},
{e:"⚙️",t:"Engineering Documentary",c:"Technology",u:"https://www.youtube.com/embed/WXuK6gekU1Y"},
{e:"🎮",t:"Gaming Documentary",c:"Gaming",u:"https://www.youtube.com/embed/GoyGlyrYkFo"},
{e:"🎬",t:"Night of the Living Dead",c:"Movies",u:"https://archive.org/embed/night-of-the-living-dead-1968-english"},
{e:"📺",t:"Popeye Cartoon",c:"Cartoons",u:"https://archive.org/embed/Popeye_forPresident"},
{e:"🎓",t:"Duck and Cover",c:"Education",u:"https://archive.org/embed/DuckAndCover_201310"},
{e:"🌊",t:"Ocean Life",c:"Nature",u:"https://www.youtube.com/embed/r9PeYPHdpNo"},
{e:"🔭",t:"Moon Documentary",c:"Space",u:"https://www.youtube.com/embed/oSEf6FzG8N0"},
{e:"🕹️",t:"Retro Gaming",c:"Gaming",u:"https://www.youtube.com/embed/Rv8Xb7Y4q6A"}
];

const categories=["All",...new Set(videos.map(v=>v.c))];
let filter="All";

function play(i){
player.src=videos[i].u;
title.textContent=videos[i].t;
category.textContent="Category: "+videos[i].c;
localStorage.setItem("jayvox-last",i);

let recent=JSON.parse(localStorage.getItem("jayvox-recent")||"[]");
recent=recent.filter(x=>x!==i);
recent.unshift(i);
recent=recent.slice(0,10);
localStorage.setItem("jayvox-recent",JSON.stringify(recent));

renderRecent();
renderContinue();
}

function renderTabs(){
tabs.innerHTML="";
categories.forEach(c=>{
tabs.innerHTML+=`<div class="tab" onclick="filter='${c}';render()">${c} (${videos.filter(v=>c==='All'||v.c===c).length})</div>`;
});
}

function render(){
let q=search.value.toLowerCase();
cards.innerHTML="";
let list=videos.filter(v=>(filter==="All"||v.c===filter)&&v.t.toLowerCase().includes(q));
count.textContent=list.length;
list.forEach(v=>{
let i=videos.indexOf(v);
cards.innerHTML+=`<div class="card" onclick="play(${i})" ondblclick="addFav(${i})">
<div class="thumb">${v.e}</div>
<div class="meta"><b>${v.t}</b><div class="small">${v.c}</div></div>
</div>`;
});
}

function addFav(i){
let fav=JSON.parse(localStorage.getItem("jayvox-favorites")||"[]");
if(!fav.includes(i)) fav.push(i);
localStorage.setItem("jayvox-favorites",JSON.stringify(fav));
}

function toggleFavorites(){
const p=document.getElementById("favoritesPanel");
if(p.style.display==="block"){p.style.display="none";return;}
let fav=JSON.parse(localStorage.getItem("jayvox-favorites")||"[]");
favoritesList.innerHTML="";
fav.forEach(i=>{
favoritesList.innerHTML+=`<div class="favItem" onclick="play(${i});toggleFavorites()">${videos[i].t}</div>`;
});
p.style.display="block";
}

function renderContinue(){
let last=localStorage.getItem("jayvox-last");
if(last!==null) continueBox.innerHTML="<b>"+videos[last].t+"</b>";
}

function renderRecent(){
let recent=JSON.parse(localStorage.getItem("jayvox-recent")||"[]");
recentBox.innerHTML=recent.length?recent.map(i=>videos[i].t).join(" • "):"No history yet.";
}

function randomVideo(){play(Math.floor(Math.random()*videos.length));}

search.oninput=render;
renderTabs();
render();
const last=localStorage.getItem("jayvox-last");
play(last?Number(last):0);
</script>
</body>
</html>
