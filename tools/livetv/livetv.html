<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>JayVox TV v1.5</title>
<style>
body{margin:0;background:#0b1220;color:#fff;font-family:Arial,sans-serif}
header{position:sticky;top:0;background:#111827;padding:12px;display:flex;gap:10px;justify-content:center;flex-wrap:wrap;z-index:10}
.btn{background:#2563eb;color:#fff;text-decoration:none;border:none;padding:10px 14px;border-radius:8px;cursor:pointer}
.container{max-width:1400px;margin:auto;padding:15px}
.search{width:100%;padding:12px;border:none;border-radius:10px}
.hero{margin:15px 0;background:#1f2937;border-radius:16px;padding:20px}
.hero h1{margin:0}
.player{aspect-ratio:16/9;background:#000;border-radius:14px;overflow:hidden;margin-top:12px}
iframe{width:100%;height:100%;border:0}
.rowtitle{margin:20px 0 10px}
.tabs{display:flex;gap:8px;flex-wrap:wrap}
.tab{background:#1f2937;padding:8px 12px;border-radius:20px;cursor:pointer}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px}
.card{background:#1f2937;border-radius:12px;overflow:hidden;cursor:pointer}
.thumb{height:120px;display:flex;align-items:center;justify-content:center;font-size:42px;background:#374151}
.card div{padding:10px}
.small{opacity:.75;font-size:13px}
</style>
</head>
<body>

<header>
<a class="btn" href="https://jayvox.in">🏠 Home</a>
<button class="btn" onclick="randomVideo()">🎲 Surprise Me</button>
<button class="btn" onclick="showFavorites()">⭐ Favorites</button>
</header>

<div class="container">

<input id="search" class="search" placeholder="Search videos...">

<div class="hero">
<h1>📺 JayVox TV</h1>
<div id="featured">Featured: NASA Live Earth</div>
<div class="player"><iframe id="player" allowfullscreen></iframe></div>
</div>

<h3 class="rowtitle">Categories</h3>
<div class="tabs" id="tabs"></div>

<h3 class="rowtitle">Continue Watching</h3>
<div id="continueBox" class="small">Your last watched video will appear here.</div>

<h3 class="rowtitle">Trending</h3>
<div class="grid" id="trending"></div>

<h3 class="rowtitle">All Videos</h3>
<div class="grid" id="cards"></div>

</div>

<script>
const videos=[
{e:"🚀",t:"NASA Live Earth",c:"Space",u:"https://www.youtube.com/embed/DDU-rZs-Ic4"},
{e:"🌕",t:"Artemis Mission",c:"Space",u:"https://www.youtube.com/embed/21X5lGlDOfg"},
{e:"🏛️",t:"Ancient Civilizations",c:"History",u:"https://www.youtube.com/embed/hle2-bGDh10"},
{e:"⚔️",t:"World War Documentary",c:"History",u:"https://www.youtube.com/embed/HAnw168huqA"},
{e:"🧪",t:"Science Documentary",c:"Science",u:"https://www.youtube.com/embed/Q1YqgPAtzho"},
{e:"🌿",t:"Wildlife Nature",c:"Nature",u:"https://www.youtube.com/embed/6v2L2UGZJAM"},
{e:"⚙️",t:"Engineering Documentary",c:"Technology",u:"https://www.youtube.com/embed/WXuK6gekU1Y"},
{e:"🎮",t:"Gaming Documentary",c:"Gaming",u:"https://www.youtube.com/embed/GoyGlyrYkFo"},
{e:"🎬",t:"Night of the Living Dead",c:"Movies",u:"https://archive.org/embed/night-of-the-living-dead-1968-english"},
{e:"📺",t:"Popeye Cartoon",c:"Cartoons",u:"https://archive.org/embed/Popeye_forPresident"},
{e:"🎓",t:"Duck and Cover",c:"Education",u:"https://archive.org/embed/DuckAndCover_201310"}
];

const cats=["All",...new Set(videos.map(v=>v.c))];
let filter="All";

function play(i){
player.src=videos[i].u;
featured.textContent="Featured: "+videos[i].t;
localStorage.setItem("jayvox-last",i);
renderContinue();
}
function card(v,i){
return `<div class="card" onclick="play(${i})"><div class="thumb">${v.e}</div><div><b>${v.t}</b><br><span class='small'>${v.c}</span></div></div>`;
}
function render(){
const q=search.value.toLowerCase();
cards.innerHTML="";
videos.forEach((v,i)=>{
if((filter==="All"||v.c===filter)&&v.t.toLowerCase().includes(q)){
cards.innerHTML+=card(v,i);
}
});
}
function renderTabs(){
tabs.innerHTML="";
cats.forEach(c=>{
tabs.innerHTML+=`<div class="tab" onclick="filter='${c}';render()">${c}</div>`;
});
}
function renderTrending(){
trending.innerHTML="";
videos.slice(0,6).forEach((v,i)=>trending.innerHTML+=card(v,i));
}
function renderContinue(){
const last=localStorage.getItem("jayvox-last");
if(last!==null){
continueBox.innerHTML="Last watched: <b>"+videos[last].t+"</b>";
}
}
function randomVideo(){play(Math.floor(Math.random()*videos.length));}
function showFavorites(){alert("Favorites system will expand in v1.6");}

search.oninput=render;
renderTabs();
renderTrending();
render();
const last=localStorage.getItem("jayvox-last");
play(last?Number(last):0);
</script>

</body>
</html>
