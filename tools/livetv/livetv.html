<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JayVox Live TV</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#000;
color:#fff;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

.tv-container{
width:100%;
max-width:1200px;
}

h1{
text-align:center;
margin-bottom:15px;
color:#00ff88;
}

.search-box{
width:100%;
padding:12px;
font-size:16px;
border:none;
border-radius:10px;
margin-bottom:15px;
}

.tv-screen{
position:relative;
background:#111;
border:10px solid #444;
border-radius:20px;
overflow:hidden;
aspect-ratio:16/9;
box-shadow:
0 0 30px rgba(0,255,100,.3),
inset 0 0 50px rgba(255,255,255,.05);
}

.tv-screen iframe{
width:100%;
height:100%;
border:none;
}

.crt-overlay{
pointer-events:none;
position:absolute;
top:0;
left:0;
right:0;
bottom:0;
background:
linear-gradient(
rgba(255,255,255,.02) 50%,
rgba(0,0,0,.05) 50%);
background-size:100% 4px;
}

.static{
position:absolute;
inset:0;
background:
repeating-radial-gradient(circle,#fff 0 1px,#000 2px 4px);
opacity:0;
pointer-events:none;
}

.info{
margin-top:15px;
text-align:center;
}

.channel-name{
font-size:20px;
font-weight:bold;
color:#00ff88;
}

.movie-title{
font-size:18px;
margin-top:5px;
}

.controls{
display:flex;
flex-wrap:wrap;
gap:10px;
justify-content:center;
margin-top:20px;
}

button{
padding:12px 18px;
border:none;
border-radius:10px;
background:#00aa55;
color:white;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#00cc66;
}

.favorite{
background:#cc8800;
}

.favorite:hover{
background:#ffaa00;
}

.favorites-list{
margin-top:20px;
background:#111;
padding:15px;
border-radius:12px;
display:none;
}

.favorites-list h3{
margin-bottom:10px;
}

.favorites-list ul{
padding-left:20px;
}

.favorites-list li{
margin-bottom:5px;
cursor:pointer;
}

@media(max-width:768px){
button{
flex:1 1 calc(50% - 10px);
}
}
</style>
</head>

<body>

<div class="tv-container">

<h1>📺 JayVox Live TV</h1>

<input
type="text"
id="search"
class="search-box"
placeholder="Search movie..."
>

<div class="tv-screen">

<div class="static" id="static"></div>

<iframe
id="player"
allowfullscreen>
</iframe>

<div class="crt-overlay"></div>

</div>

<div class="info">

<div class="channel-name" id="channelName">
Loading...
</div>

<div class="movie-title" id="movieTitle">
Loading...
</div>

</div>

<div class="controls">

<button onclick="prevChannel()">⬅ Channel</button>

<button onclick="nextChannel()">Channel ➡</button>

<button onclick="randomChannel()">🎲 Random</button>

<button onclick="toggleFullscreen()">⛶ Fullscreen</button>

<button class="favorite" onclick="saveFavorite()">
⭐ Favorite
</button>

<button onclick="toggleFavorites()">
📋 Favorites
</button>

</div>

<div class="favorites-list" id="favoritesBox">
<h3>Saved Favorites</h3>
<ul id="favoritesList"></ul>
</div>

</div>

<script>

let playlist=[];
let channels=[];
let currentIndex=0;

async function loadData(){

try{

const playlistResponse=
await fetch('playlist.json');

playlist=
await playlistResponse.json();

const channelResponse=
await fetch('channels.json');

channels=
await channelResponse.json();

loadChannel(0);

}catch(error){

document.getElementById('movieTitle')
.textContent='Failed to load playlist';

console.error(error);

}

}

function archiveURL(id){

return `https://archive.org/embed/${id}`;

}

function showStatic(){

const s=document.getElementById('static');

s.style.opacity='0.25';

setTimeout(()=>{
s.style.opacity='0';
},700);

}

function loadChannel(index){

if(!playlist.length) return;

currentIndex=index;

const item=playlist[index];

showStatic();

document.getElementById('player').src=
archiveURL(item.archiveId);

document.getElementById('movieTitle').textContent=
`${item.title} (${item.year})`;

document.getElementById('channelName').textContent=
item.category;

}

function nextChannel(){

currentIndex++;

if(currentIndex>=playlist.length)
currentIndex=0;

loadChannel(currentIndex);

}

function prevChannel(){

currentIndex--;

if(currentIndex<0)
currentIndex=playlist.length-1;

loadChannel(currentIndex);

}

function randomChannel(){

const random=
Math.floor(Math.random()*playlist.length);

loadChannel(random);

}

function toggleFullscreen(){

const screen=
document.querySelector('.tv-screen');

if(screen.requestFullscreen){
screen.requestFullscreen();
}

}

function saveFavorite(){

const item=
playlist[currentIndex];

let favorites=
JSON.parse(
localStorage.getItem('jayvoxFavorites')
||'[]'
);

if(
!favorites.find(
f=>f.archiveId===item.archiveId
)
){
favorites.push(item);
}

localStorage.setItem(
'jayvoxFavorites',
JSON.stringify(favorites)
);

alert('Saved to favorites');

renderFavorites();

}

function renderFavorites(){

let favorites=
JSON.parse(
localStorage.getItem('jayvoxFavorites')
||'[]'
);

const list=
document.getElementById('favoritesList');

list.innerHTML='';

favorites.forEach(item=>{

const li=
document.createElement('li');

li.textContent=
`${item.title} (${item.year})`;

li.onclick=()=>{

const found=
playlist.findIndex(
p=>p.archiveId===item.archiveId
);

if(found>=0){
loadChannel(found);
}

};

list.appendChild(li);

});

}

function toggleFavorites(){

const box=
document.getElementById('favoritesBox');

if(
box.style.display==='block'
){
box.style.display='none';
}else{
box.style.display='block';
renderFavorites();
}

}

document
.getElementById('search')
.addEventListener('input',e=>{

const query=
e.target.value.toLowerCase();

if(!query) return;

const found=
playlist.findIndex(item=>
item.title.toLowerCase()
.includes(query)
);

if(found>=0){
loadChannel(found);
}

});

loadData();

</script>

</body>
</html>
