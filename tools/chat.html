<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Global Chatroom - JPTools</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f172a;
    color: white;
}

header {
    text-align: center;
    padding: 15px;
    background: #1e293b;
}

#chatBox {
    height: 60vh;
    overflow-y: auto;
    padding: 10px;
}

.message {
    background: #334155;
    margin: 5px;
    padding: 10px;
    border-radius: 5px;
}

input, button {
    padding: 10px;
    margin: 5px;
    border-radius: 5px;
    border: none;
}

button {
    background: #22c55e;
    color: white;
}
</style>
</head>

<body>

<header>
<h2>💬 Global Chatroom</h2>
</header>

<div style="text-align:center;">
<input type="text" id="name" placeholder="Enter your name">
</div>

<div id="chatBox"></div>

<div style="text-align:center;">
<input type="text" id="message" placeholder="Type message">
<button onclick="sendMessage()">Send</button>
</div>

<a href="../index.html" style="color:#38bdf8;text-align:center;display:block;margin:10px;">⬅ Back</a>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, query, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCRTNEJF5vz0DiSxVoyxPswN5uPQAZFy8",
  authDomain: "jptools-chat.firebaseapp.com",
  projectId: "jptools-chat",
  storageBucket: "jptools-chat.firebasestorage.app",
  messagingSenderId: "806301752228",
  appId: "1:806301752228:web:0b53cd4427de36d740ff31"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const chatBox = document.getElementById("chatBox");

window.sendMessage = async function() {
    const name = document.getElementById("name").value;
    const message = document.getElementById("message").value;

    if (!name || !message) return;

    await addDoc(collection(db, "messages"), {
        name,
        message,
        time: Date.now()
    });

    document.getElementById("message").value = "";
};

const q = query(collection(db, "messages"), orderBy("time"));

onSnapshot(q, (snapshot) => {
    chatBox.innerHTML = "";
    snapshot.forEach(doc => {
        const data = doc.data();
        chatBox.innerHTML += `
            <div class="message">
                <b>${data.name}:</b> ${data.message}
            </div>
        `;
    });
});

</script>

</body>
</html>
