<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Global Chatroom - JPTools</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    color: white;
    background-size: cover;
    background-position: center;
    transition: background-image 1s ease-in-out;
}

header {
    text-align: center;
    padding: 15px;
    background: rgba(0,0,0,0.6);
}

#chatBox {
    height: 55vh;
    overflow-y: auto;
    padding: 10px;
    background: rgba(0,0,0,0.5);
}

.message {
    background: rgba(51,65,85,0.9);
    margin: 8px;
    padding: 12px;
    border-radius: 8px;
}

.bottom {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    background: rgba(0,0,0,0.6);
}

input {
    padding: 10px;
    margin: 5px;
    border-radius: 5px;
    border: none;
}

button {
    padding: 10px;
    margin: 5px;
    border-radius: 5px;
    border: none;
    background: #22c55e;
    color: white;
    cursor: pointer;
}

button:hover {
    background: #16a34a;
}
</style>
</head>

<body>

<header>
<h2>💬 Global Chatroom</h2>
<div id="onlineCount">🟢 0 users online</div>
</header>

<div style="text-align:center;">
<input type="text" id="name" placeholder="Enter your name">
</div>

<div id="chatBox"></div>

<div class="bottom">
<input type="text" id="message" placeholder="Type message">
<button onclick="addEmoji()">😊</button>
<button onclick="startVoice()">🎤</button>
<button onclick="startRecording()">🎙️</button>
<button onclick="sendMessage()">Send</button>
</div>

<a href="../index.html" style="color:#38bdf8;text-align:center;display:block;margin:10px;">⬅ Back</a>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, doc, setDoc, updateDoc, increment } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCRTNEJF5vz0DiSxVoyxPswN5uPQAZFy8",
  authDomain: "jptools-chat.firebaseapp.com",
  projectId: "jptools-chat",
  storageBucket: "jptools-chat.firebasestorage.app",
  messagingSenderId: "806301752228",
  appId: "1:806301752228:web:0b53cd4427de36d740ff31"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const chatBox = document.getElementById("chatBox");

// ✅ Username save
const nameInput = document.getElementById("name");
nameInput.value = localStorage.getItem("chatName") || "";

nameInput.addEventListener("input", () => {
    localStorage.setItem("chatName", nameInput.value);
});

// ✅ Unique user ID
let userId = localStorage.getItem("userId");
if (!userId) {
    userId = "user_" + Math.random().toString(36).substring(2);
    localStorage.setItem("userId", userId);
}

// ✅ Update online status
setInterval(() => {
    setDoc(doc(db, "onlineUsers", userId), {
        lastActive: Date.now()
    });
}, 10000);

// ✅ Count users
onSnapshot(collection(db, "onlineUsers"), (snapshot) => {
    let count = 0;
    const now = Date.now();

    snapshot.forEach(doc => {
        const data = doc.data();
        if (now - data.lastActive < 30000) count++;
    });

    document.getElementById("onlineCount").innerText = `🟢 ${count} users online`;
});

// ✅ Send message
window.sendMessage = async function() {
    const name = nameInput.value;
    const message = document.getElementById("message").value;

    if (!name || !message) return;

    await addDoc(collection(db, "messages"), {
        name,
        message,
        time: Date.now(),
        upvotes: 0,
        downvotes: 0
    });

    document.getElementById("message").value = "";
};

// ✅ Auto scroll
let shouldScroll = true;

chatBox.addEventListener("scroll", () => {
    shouldScroll = chatBox.scrollHeight - chatBox.scrollTop <= chatBox.clientHeight + 20;
});

const q = query(collection(db, "messages"), orderBy("time"));

onSnapshot(q, (snapshot) => {
    chatBox.innerHTML = "";

    snapshot.forEach(docSnap => {
        const data = docSnap.data();

        chatBox.innerHTML += `
        <div class="message">
            <b>${data.name}:</b> ${data.message}
            <br><br>
            👍🏻 ${data.upvotes || 0}
            <button onclick="vote('${docSnap.id}', 'up')">👍🏻</button>

            👎🏻 ${data.downvotes || 0}
            <button onclick="vote('${docSnap.id}', 'down')">👎🏻</button>
        </div>
        `;
    });

    if (shouldScroll) {
        chatBox.scrollTop = chatBox.scrollHeight;
    }
});

// ✅ Voting system
window.vote = async function(id, type) {
    const ref = doc(db, "messages", id);

    if (type === "up") {
        await updateDoc(ref, {
            upvotes: increment(1)
        });
    } else {
        await updateDoc(ref, {
            downvotes: increment(1)
        });
    }
};

// 😊 Emoji
window.addEmoji = () => {
    document.getElementById("message").value += "😊";
};

// 🎤 Speech to text
window.startVoice = () => {
    const recognition = new webkitSpeechRecognition();
    recognition.lang = "en-IN";

    recognition.onresult = e => {
        document.getElementById("message").value += e.results[0][0].transcript;
    };

    recognition.start();
};

// 🎙️ Audio (12 sec)
let recorder, chunks = [];

window.startRecording = async () => {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });

    recorder = new MediaRecorder(stream);
    recorder.ondataavailable = e => chunks.push(e.data);

    recorder.onstop = async () => {
        const blob = new Blob(chunks);
        const url = URL.createObjectURL(blob);

        await addDoc(collection(db, "messages"), {
            name: nameInput.value,
            message: `<audio controls src="${url}"></audio>`,
            time: Date.now(),
            upvotes: 0,
            downvotes: 0
        });

        chunks = [];
    };

    recorder.start();
    setTimeout(() => recorder.stop(), 12000);
};

// 🌄 Background slideshow
const images = [
    "https://picsum.photos/seed/1/1200/800",
    "https://picsum.photos/seed/2/1200/800",
    "https://picsum.photos/seed/3/1200/800",
    "https://picsum.photos/seed/4/1200/800"
];

let i = 0;

setInterval(() => {
    document.body.style.backgroundImage = `url(${images[i]})`;
    i = (i + 1) % images.length;
}, 5000);

</script>

</body>
</html>
