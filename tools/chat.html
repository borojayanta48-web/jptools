<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, query, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCRTNEJF5vz0DiSxVoyxPswN5uPQAZFy8",
  authDomain: "jptools-chat.firebaseapp.com",
  projectId: "jptools-chat",
  storageBucket: "jptools-chat.firebasestorage.app",
  messagingSenderId: "806301752228",
  appId: "1:806301752228:web:0b53cd4427de36d740ff31"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const chatBox = document.getElementById("chatBox");

window.sendMessage = async function() {
    const name = document.getElementById("name").value;
    const message = document.getElementById("message").value;

    if (!name || !message) return;

    await addDoc(collection(db, "messages"), {
        name,
        message,
        time: Date.now()
    });

    document.getElementById("message").value = "";
};

const q = query(collection(db, "messages"), orderBy("time"));

onSnapshot(q, (snapshot) => {
    chatBox.innerHTML = "";
    snapshot.forEach(doc => {
        const data = doc.data();
        chatBox.innerHTML += `
            <div class="message">
                <b>${data.name}:</b> ${data.message}
            </div>
        `;
    });
});

</script>
