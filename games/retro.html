<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Retro Console - JPTools</title>

<style>
body {
    margin:0;
    font-family:Arial;
    background:#0f172a;
    color:white;
    text-align:center;
}

header {
    display:flex;
    align-items:center;
    gap:10px;
    padding:10px;
    background:#1e293b;
}

.container { padding:20px; }

#game {
    width:100%;
    max-width:500px;
    height:300px;
    margin:auto;
    background:black;
    border-radius:15px;
    box-shadow:0 0 25px #22c55e;
}

.actions button {
    padding:10px;
    margin:5px;
    border:none;
    border-radius:8px;
    background:#22c55e;
    color:white;
}

/* Controller */
.controller {
    margin-top:20px;
    display:flex;
    justify-content:center;
    gap:40px;
}

.dpad {
    display:grid;
    grid-template-columns:repeat(3,60px);
    gap:5px;
}

.btn {
    background:#1e293b;
    border-radius:12px;
    padding:15px;
    font-size:18px;
}
</style>
</head>

<body>

<header>
<a href="../index.html">
<img src="../images/logo.png" style="height:40px;">
</a>
<h2>🎮 Retro Console</h2>
</header>

<div class="container">

<input type="file" id="romUpload"><br>

<select id="core">
<option value="nes">NES</option>
<option value="gba">GBA</option>
<option value="gb">Game Boy</option>
<option value="snes">SNES</option>
</select>

<br><br>

<button onclick="startGame()">▶ Start Game</button>

<div id="game"></div>

<div class="actions">
<button onclick="fullscreen()">📺 Fullscreen</button>
<button onclick="resetGame()">🔁 Reset</button>
</div>

<div class="controller">
<div class="dpad">
<div></div>
<div class="btn" onclick="pressKey('ArrowUp')">⬆️</div>
<div></div>

<div class="btn" onclick="pressKey('ArrowLeft')">⬅️</div>
<div></div>
<div class="btn" onclick="pressKey('ArrowRight')">➡️</div>

<div></div>
<div class="btn" onclick="pressKey('ArrowDown')">⬇️</div>
<div></div>
</div>

<div>
<div class="btn" onclick="pressKey('z')">A</div>
<div class="btn" onclick="pressKey('x')">B</div>
</div>
</div>

</div>

<script>

let currentRom = null;
let emulatorLoaded = false;

function startGame(){

    let file = document.getElementById("romUpload").files[0];
    let core = document.getElementById("core").value;

    if(!file){
        alert("Upload ROM first!");
        return;
    }

    let reader = new FileReader();

    reader.onload = function(e){

        currentRom = e.target.result;

        loadEmulator(currentRom, core);
    };

    reader.readAsDataURL(file);
}

function loadEmulator(rom, core){

    document.getElementById("game").innerHTML = "";

    // Reset emulator
    window.EJS_player = "#game";
    window.EJS_gameUrl = rom;
    window.EJS_core = core;

    // 🔥 FIXED PATH
    window.EJS_pathtodata = "../emulatorjs/data/";

    // Remove old script if exists
    let old = document.getElementById("emulatorScript");
    if(old) old.remove();

    let script = document.createElement("script");
    script.id = "emulatorScript";
    script.src = "../emulatorjs/loader.js";
    document.body.appendChild(script);
}

// Controls
function pressKey(key){
    document.dispatchEvent(new KeyboardEvent("keydown",{key:key}));
    setTimeout(()=>{
        document.dispatchEvent(new KeyboardEvent("keyup",{key:key}));
    },100);
}

// Fullscreen
function fullscreen(){
    let el = document.getElementById("game");
    if(el.requestFullscreen) el.requestFullscreen();
}

// Reset
function resetGame(){
    if(currentRom){
        let core = document.getElementById("core").value;
        loadEmulator(currentRom, core);
    }
}

</script>

</body>
</html>
