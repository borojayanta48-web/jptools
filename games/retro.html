<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Retro Console - JPTools</title>

<style>
body {
    margin:0;
    font-family:Arial;
    background:#0f172a;
    color:white;
    text-align:center;
}

header {
    display:flex;
    align-items:center;
    gap:10px;
    padding:10px;
    background:#1e293b;
}

.container {
    padding:20px;
}

#game {
    width:100%;
    max-width:500px;
    height:300px;
    margin:auto;
    background:black;
    border-radius:15px;
    box-shadow:0 0 20px #22c55e;
}

/* CONTROLLER DESIGN */
.controller {
    margin-top:20px;
    display:flex;
    justify-content:center;
    gap:30px;
}

.dpad {
    display:grid;
    grid-template-columns:repeat(3,60px);
    gap:5px;
}

.btn {
    background:#1e293b;
    border-radius:10px;
    padding:15px;
    font-size:18px;
    cursor:pointer;
}

.btn:active {
    background:#22c55e;
}

.ab {
    display:flex;
    flex-direction:column;
    gap:10px;
}

.upload {
    margin:20px;
}
</style>
</head>

<body>

<header>
<a href="../index.html">
<img src="../images/logo.png" style="height:40px;">
</a>
<h2>🎮 Retro Console</h2>
</header>

<div class="container">

<h3>Upload ROM & Play</h3>

<input type="file" id="romUpload" class="upload">

<br>

<select id="core">
<option value="nes">NES</option>
<option value="gba">GBA</option>
<option value="gb">Game Boy</option>
<option value="snes">SNES</option>
</select>

<br><br>

<button onclick="startGame()">▶ Start Game</button>

<div id="game"></div>

<!-- CONTROLLER -->
<div class="controller">

<div class="dpad">
<div></div>
<div class="btn" onclick="pressKey('ArrowUp')">⬆️</div>
<div></div>

<div class="btn" onclick="pressKey('ArrowLeft')">⬅️</div>
<div></div>
<div class="btn" onclick="pressKey('ArrowRight')">➡️</div>

<div></div>
<div class="btn" onclick="pressKey('ArrowDown')">⬇️</div>
<div></div>
</div>

<div class="ab">
<div class="btn" onclick="pressKey('z')">A</div>
<div class="btn" onclick="pressKey('x')">B</div>
</div>

</div>

<p>🎮 Controls: Arrow keys + Z (A) + X (B)</p>

</div>

<script>

function startGame(){

    let file = document.getElementById("romUpload").files[0];
    let core = document.getElementById("core").value;

    if(!file){
        alert("Upload ROM first!");
        return;
    }

    let reader = new FileReader();

    reader.onload = function(e){

        document.getElementById("game").innerHTML = "";

        window.EJS_player = "#game";
        window.EJS_gameUrl = e.target.result;
        window.EJS_core = core;
        window.EJS_pathtodata = "emulatorjs/data/";

        let script = document.createElement("script");
        script.src = "emulatorjs/loader.js";
        document.body.appendChild(script);
    };

    reader.readAsDataURL(file);
}

// MOBILE BUTTON KEYS
function pressKey(key){
    let e = new KeyboardEvent("keydown",{key:key});
    document.dispatchEvent(e);

    setTimeout(()=>{
        document.dispatchEvent(new KeyboardEvent("keyup",{key:key}));
    },100);
}

</script>

</body>
</html>
