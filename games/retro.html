<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Retro Console - JPTools</title>

<style>
body {
    margin:0;
    font-family:Arial;
    background:#0f172a;
    color:white;
    text-align:center;
}

header {
    display:flex;
    align-items:center;
    gap:10px;
    padding:10px;
    background:#1e293b;
}

.container { padding:20px; }

#game {
    width:100%;
    max-width:500px;
    height:300px;
    margin:auto;
    background:black;
    border-radius:15px;
    box-shadow:0 0 25px #22c55e;
}

button, select {
    padding:10px;
    margin:5px;
    border:none;
    border-radius:8px;
}

button {
    background:#22c55e;
    color:white;
}
</style>
</head>

<body>

<header>
<a href="../index.html">
<img src="../images/logo.png" style="height:40px;">
</a>
<h2>🎮 Retro Console</h2>
</header>

<div class="container">

<input type="file" id="romUpload"><br>

<select id="core">
<option value="nes">nes</option>
<option value="gba">gba</option>
<option value="gb">gb</option>
<option value="snes">snes</option>
</select>

<br>

<button onclick="startGame()">▶ Start Game</button>

<div id="game"></div>

</div>

<script>

function startGame(){

    let file = document.getElementById("romUpload").files[0];
    let core = document.getElementById("core").value;

    if(!file){
        alert("Upload ROM first!");
        return;
    }

    let reader = new FileReader();

    reader.onload = function(e){

        document.getElementById("game").innerHTML = "";

        window.EJS_player = "#game";
        window.EJS_gameUrl = e.target.result;
        window.EJS_core = core;

        // 🔥 USE CDN (THIS FIXES EVERYTHING)
        window.EJS_pathtodata = "https://cdn.emulatorjs.org/stable/data/";

        let old = document.getElementById("emulatorScript");
        if(old) old.remove();

        let script = document.createElement("script");
        script.id = "emulatorScript";
        script.src = "https://cdn.emulatorjs.org/stable/data/loader.js";

        document.body.appendChild(script);
    };

    reader.readAsDataURL(file);
}

</script>

</body>
</html>
